<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Intermediate Accounting I Study Hub</title>
  <style>
    :root{--bg:#f6f8fb;--paper:#fff;--ink:#172026;--muted:#607080;--line:#dce4ee;--blue:#1f4e79;--green:#21806a;--coral:#d96b52;--shadow:0 14px 34px rgba(30,50,70,.10)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,"Microsoft YaHei",sans-serif;color:var(--ink);background:linear-gradient(rgba(31,78,121,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(31,78,121,.045) 1px,transparent 1px),var(--bg);background-size:28px 28px;display:grid;place-items:center;padding:24px}
    main{width:min(920px,100%);background:var(--paper);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:30px}
    h1{margin:0;font-size:clamp(28px,4vw,44px)}p{color:var(--muted);line-height:1.8}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:24px}
    a{display:block;text-decoration:none;color:inherit;border:1px solid var(--line);border-radius:10px;padding:20px;background:#fff}
    a:hover{transform:translateY(-2px);box-shadow:var(--shadow)}.tag{display:inline-block;color:#fff;background:var(--green);border-radius:999px;padding:4px 10px;font-size:13px;font-weight:700}.test .tag{background:var(--coral)}
    h2{margin:12px 0 8px;color:var(--blue)}
  </style>
</head>
<body>
  <main>
    <h1>Intermediate Accounting I Study Hub</h1>
    <p>中级财务会计 I 复习资料与章节测试。建议先学习复习资料，再进入章节测试或随机练习。</p>
    <div class="grid">
      <a href="review_materials.html">
        <span class="tag">Review</span>
        <h2>复习资料</h2>
        <p>教学型中英双语讲义，按章节解释核心概念、规则、分录、计算和例题逻辑。</p>
      </a>
      <a class="test" href="chapter_tests.html">
        <span class="tag">Quiz</span>
        <h2>章节测试</h2>
        <p>英文题库、随机练习、提交判分和中文解析，适合考前训练。</p>
      </a>
    </div>
  </main>
</body>
</html>
